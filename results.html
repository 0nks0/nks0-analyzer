<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NKS0 — Analysis Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg nks-navbar">
        <div class="container-fluid">
            <a class="navbar-brand nks-brand" href="index.html">
                <i class="bi bi-shield-lock-fill"></i> NKS0
            </a>
            <span class="navbar-text text-secondary d-none d-md-inline">Analysis Results</span>

            <div class="d-flex align-items-center gap-2 ms-auto nks-connection-bar">
                <input type="text" id="api-base-input"
                    class="form-control form-control-sm nks-url-input"
                    placeholder="Backend URL">
                <input type="password" id="api-key-input"
                    class="form-control form-control-sm nks-key-input"
                    placeholder="API Key"
                    autocomplete="off">
                <button type="button" class="btn btn-sm btn-outline-secondary" id="api-save-btn">Save</button>
                <span id="api-status" class="badge nks-status-badge" title="Backend connection status">—</span>
            </div>
        </div>
    </nav>

    <!-- Main -->
    <main class="container-fluid px-4 py-3">

        <!-- Loading -->
        <div id="loading-state" class="text-center mt-5">
            <div class="spinner-border text-info" role="status"></div>
            <p class="text-secondary mt-2">Loading results...</p>
        </div>

        <!-- Results -->
        <div id="results-content" class="d-none">

            <!-- Back link + export -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a href="index.html" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> New analysis
                </a>
                <button class="btn btn-sm btn-outline-secondary" id="export-json-btn">
                    <i class="bi bi-download"></i> Export JSON
                </button>
            </div>

            <!-- Stat cards row -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="card nks-card nks-stat-card">
                        <div class="card-body text-center p-3">
                            <div class="nks-stat-value" id="stat-filename">-</div>
                            <div class="nks-stat-label">File</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card nks-card nks-stat-card">
                        <div class="card-body text-center p-3">
                            <div class="nks-stat-value" id="stat-packets">-</div>
                            <div class="nks-stat-label">Packets</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card nks-card nks-stat-card">
                        <div class="card-body text-center p-3">
                            <div class="nks-stat-value" id="stat-duration">-</div>
                            <div class="nks-stat-label">Duration</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card nks-card nks-stat-card">
                        <div class="card-body text-center p-3">
                            <div class="nks-stat-value" id="stat-analysis-time">-</div>
                            <div class="nks-stat-label">Analysis Time</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Severity summary pills -->
            <div class="d-flex gap-2 mb-4 flex-wrap" id="severity-badges"></div>

            <!-- Main columns -->
            <div class="row g-4">

                <!-- Alerts (left / wide) -->
                <div class="col-lg-8">
                    <div class="card nks-card">
                        <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
                            <span><i class="bi bi-exclamation-triangle"></i> Alerts</span>
                            <div class="d-flex gap-2 flex-wrap align-items-center">
                                <div class="btn-group btn-group-sm" id="alert-filters"></div>
                                <input type="search" id="alert-search"
                                    class="form-control form-control-sm nks-alert-search"
                                    placeholder="Search alerts…"
                                    title="Filter alerts by text">
                            </div>
                        </div>
                        <div class="card-body p-0" id="alerts-container">
                            <div class="text-center text-secondary p-4">No alerts</div>
                        </div>
                        <div class="card-footer nks-alerts-footer d-none" id="alerts-footer">
                            <span id="alerts-count-label" class="text-secondary small"></span>
                        </div>
                    </div>
                </div>

                <!-- Right column -->
                <div class="col-lg-4">

                    <!-- Protocol chart -->
                    <div class="card nks-card mb-4">
                        <div class="card-header">
                            <i class="bi bi-pie-chart"></i> Protocol Distribution
                        </div>
                        <div class="card-body">
                            <canvas id="protocol-chart" height="230"></canvas>
                        </div>
                    </div>

                    <!-- Top talkers -->
                    <div class="card nks-card mb-4">
                        <div class="card-header">
                            <i class="bi bi-diagram-3"></i> Top Hosts
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-sm table-hover mb-0 nks-table">
                                    <thead>
                                        <tr>
                                            <th>Host</th>
                                            <th class="text-end">Sent</th>
                                            <th class="text-end">Recv</th>
                                        </tr>
                                    </thead>
                                    <tbody id="hosts-table-body"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Alert severity bar chart -->
                    <div class="card nks-card">
                        <div class="card-header">
                            <i class="bi bi-bar-chart"></i> Alert Breakdown
                        </div>
                        <div class="card-body">
                            <canvas id="severity-chart" height="170"></canvas>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Error -->
        <div id="error-state" class="text-center mt-5 d-none">
            <i class="bi bi-exclamation-triangle fs-1 text-danger"></i>
            <p class="text-danger mt-2" id="results-error-message">Failed to load results.</p>
            <a href="index.html" class="btn btn-outline-secondary mt-2">
                <i class="bi bi-arrow-left"></i> Back to upload
            </a>
        </div>

    </main>

    <!-- Footer -->
    <footer class="nks-footer text-center text-secondary small mt-5 pb-4">
        NKS0 &mdash; <a href="https://github.com/0nks0/pcap_analyzer" target="_blank" rel="noopener" class="text-secondary">GitHub</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        initConnectionBar();
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (id) {
            loadResults(id);
        } else {
            document.getElementById('loading-state').classList.add('d-none');
            document.getElementById('error-state').classList.remove('d-none');
            document.getElementById('results-error-message').textContent =
                'No analysis ID in URL. Go back and upload a PCAP file.';
        }
    });
    </script>
</body>
</html>
